<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="riftOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="25%" stop-color="#050505" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#0a1a05" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#114400" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="riftCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="50%" stop-color="#020202" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="riftGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="riftEdge">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="riftSharp">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <!-- Outer dimensional tear -->
  <circle cx="64" cy="64" r="52" fill="url(#riftOuter)" filter="url(#riftGlow)"/>
  <!-- Green edge rings -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#33aa11" stroke-width="3" opacity="0.7" filter="url(#riftEdge)"/>
  <circle cx="64" cy="64" r="34" fill="none" stroke="#88ff44" stroke-width="1" opacity="0.4" filter="url(#riftEdge)"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="#114400" stroke-width="4" opacity="0.3" filter="url(#riftEdge)"/>
  <!-- Inner void -->
  <circle cx="64" cy="64" r="30" fill="url(#riftCore)"/>
  <!-- Distortion lines -->
  <path d="M18,28 Q64,8 110,28" fill="none" stroke="#33aa11" stroke-width="1.5" opacity="0.5" filter="url(#riftSharp)"/>
  <path d="M18,100 Q64,120 110,100" fill="none" stroke="#33aa11" stroke-width="1.5" opacity="0.5" filter="url(#riftSharp)"/>
  <path d="M28,18 Q8,64 28,110" fill="none" stroke="#33aa11" stroke-width="1.5" opacity="0.5" filter="url(#riftSharp)"/>
  <path d="M100,18 Q120,64 100,110" fill="none" stroke="#33aa11" stroke-width="1.5" opacity="0.5" filter="url(#riftSharp)"/>
  <!-- Diagonal distortions -->
  <path d="M24,24 Q64,40 104,24" fill="none" stroke="#228811" stroke-width="1" opacity="0.3"/>
  <path d="M24,104 Q64,88 104,104" fill="none" stroke="#228811" stroke-width="1" opacity="0.3"/>
  <path d="M24,24 Q40,64 24,104" fill="none" stroke="#228811" stroke-width="1" opacity="0.3"/>
  <path d="M104,24 Q88,64 104,104" fill="none" stroke="#228811" stroke-width="1" opacity="0.3"/>
  <!-- Emerging tendrils -->
  <path d="M64,64 Q50,28 40,16" fill="none" stroke="#114400" stroke-width="2.5" opacity="0.5"/>
  <path d="M64,64 Q78,28 88,16" fill="none" stroke="#114400" stroke-width="2.5" opacity="0.5"/>
  <path d="M64,64 Q28,50 16,40" fill="none" stroke="#114400" stroke-width="2.5" opacity="0.5"/>
  <path d="M64,64 Q100,50 112,40" fill="none" stroke="#114400" stroke-width="2.5" opacity="0.5"/>
  <path d="M64,64 Q50,100 40,112" fill="none" stroke="#114400" stroke-width="2" opacity="0.4"/>
  <path d="M64,64 Q78,100 88,112" fill="none" stroke="#114400" stroke-width="2" opacity="0.4"/>
  <!-- Core singularity -->
  <circle cx="64" cy="64" r="8" fill="#000000" stroke="#33aa11" stroke-width="1.5" opacity="0.8"/>
  <circle cx="64" cy="64" r="4" fill="#000000" stroke="#88ff44" stroke-width="0.8" opacity="0.6"/>
  <circle cx="64" cy="64" r="2" fill="#000000"/>
  <!-- Specular on edge -->
  <circle cx="52" cy="50" r="2" fill="#88ff44" opacity="0.15"/>
  <circle cx="76" cy="78" r="1.5" fill="#88ff44" opacity="0.1"/>
</svg>