<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rsFlesh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="50%" stop-color="#1a0f08"/>
      <stop offset="100%" stop-color="#050302"/>
    </linearGradient>
    <radialGradient id="rsRift" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#33aa11" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="rsGlow">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <!-- Rift pulse -->
  <circle cx="64" cy="64" r="30" fill="url(#rsRift)" filter="url(#rsGlow)"/>
  <!-- Flesh ring -->
  <circle cx="64" cy="64" r="35" fill="url(#rsFlesh)" stroke="#4a3a2a" stroke-width="2"/>
  <!-- Inner cavity -->
  <circle cx="64" cy="64" r="22" fill="#0a0505" stroke="#3a2a1a" stroke-width="1.5"/>
  <!-- Rift core -->
  <circle cx="64" cy="64" r="8" fill="#33aa11" opacity="0.4" filter="url(#rsGlow)"/>
  <circle cx="64" cy="64" r="4" fill="#88ff44" opacity="0.6"/>
  <!-- Muscle bands -->
  <path d="M36,44 Q50,36 64,40 Q78,36 92,44" fill="none" stroke="#3a2a1a" stroke-width="2.5" opacity="0.5"/>
  <path d="M36,84 Q50,92 64,88 Q78,92 92,84" fill="none" stroke="#3a2a1a" stroke-width="2.5" opacity="0.5"/>
  <path d="M36,64 Q50,56 64,60 Q78,56 92,64" fill="none" stroke="#3a2a1a" stroke-width="2" opacity="0.4"/>
  <!-- Tendrils -->
  <path d="M64,36 L64,28" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <path d="M64,92 L64,100" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <path d="M36,64 L28,64" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <path d="M92,64 L100,64" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
</svg>