<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rdFlesh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="50%" stop-color="#1a0f08"/>
      <stop offset="100%" stop-color="#050302"/>
    </linearGradient>
    <radialGradient id="rdRift" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#33aa11" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#114400" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="rdGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Rift glow -->
  <ellipse cx="64" cy="100" rx="24" ry="16" fill="url(#rdRift)" filter="url(#rdGlow)"/>
  <!-- Flesh body -->
  <polygon points="40,30 88,30 96,70 32,70" fill="url(#rdFlesh)" stroke="#4a3a2a" stroke-width="2"/>
  <!-- Orifice -->
  <ellipse cx="64" cy="70" rx="28" ry="8" fill="#0a0505" stroke="#3a2a1a" stroke-width="1.5"/>
  <!-- Rift tear inside -->
  <ellipse cx="64" cy="72" rx="14" ry="4" fill="#33aa11" opacity="0.4" filter="url(#rdGlow)"/>
  <!-- Muscle fibers -->
  <line x1="48" y1="30" x2="46" y2="65" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <line x1="56" y1="30" x2="54" y2="65" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <line x1="64" y1="30" x2="64" y2="65" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <line x1="72" y1="30" x2="74" y2="65" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="30" x2="82" y2="65" stroke="#3a2a1a" stroke-width="2" opacity="0.5"/>
  <!-- Mount bracket -->
  <rect x="46" y="20" width="36" height="14" rx="4" fill="#2a1a0f" stroke="#4a3a2a" stroke-width="1.5"/>
</svg>